<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Shohrab Rustam</title>
    <link rel="canonical" href="https://shohrabrustam.github.io/portfolio/">
    <script>
        // Comprehensive case-insensitive redirect for 404 pages
        (function() {
            var currentUrl = window.location.href;
            var lowercaseUrl = currentUrl.toLowerCase();
            
            // If URL contains uppercase, redirect to lowercase version
            if (currentUrl !== lowercaseUrl) {
                console.log('404: Redirecting to lowercase URL:', lowercaseUrl);
                window.location.replace(lowercaseUrl);
            } else {
                // If already lowercase and still 404, redirect to home
                console.log('404: Page not found, redirecting to home');
                setTimeout(function() {
                    window.location.replace('https://shohrabrustam.github.io/portfolio/');
                }, 3000);
            }
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .url-info {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            word-break: break-all;
        }
        
        a {
            color: white;
            text-decoration: none;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
            transition: opacity 0.3s;
        }
        
        a:hover {
            opacity: 0.8;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>Converting URL to lowercase for consistency</p>
        <div class="url-info" id="currentUrl"></div>
        
        <div class="info-box">
            <p><strong>Note:</strong> This site uses case-insensitive URLs.</p>
            <p>All uppercase letters are automatically converted to lowercase.</p>
        </div>
        
        <p>If you're not redirected automatically, <a href="https://shohrabrustam.github.io/portfolio/">click here to go home</a></p>
    </div>
    
    <script>
        // Display current URL being redirected
        document.getElementById('currentUrl').textContent = window.location.href;
    </script>
</body>
</html>
